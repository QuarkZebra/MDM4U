
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>MDM4U — Data Management</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=Karla:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   LIGHT THEME (default)
   ═══════════════════════════════════════════════ */
:root{
  --bg:#f3ede4;--white:#fdfaf5;--hover:#f9f5ee;
  --brown:#2c1e12;--accent:#a64b2a;--accent-dim:rgba(166,75,42,.07);--accent-bdr:rgba(166,75,42,.20);
  --copper:#a0522d;--sage:#698068;--clay:#9c6644;--muted:#8e7d6a;--muted2:#b3a592;
  --text:#261e16;--t2:#584838;--t3:#8e7d6a;--t4:#b3a592;
  --bdr:#ddd3c4;--bdr2:#ccc0af;
  --test-bg:rgba(160,82,45,.08);--quiz-bg:rgba(166,75,42,.05);--review-bg:rgba(105,128,104,.06);
  --present-bg:rgba(156,102,68,.06);
  --r:8px;--sh:0 1px 3px rgba(44,36,24,.06);--sh2:0 2px 8px rgba(44,36,24,.06),0 8px 24px rgba(44,36,24,.04);
  --bar-opacity:.045;--topbar-bg:rgba(243,237,228,.9);
  --fab-sh:0 4px 20px rgba(166,75,42,.25);--fab-sh2:0 6px 28px rgba(166,75,42,.35);
  --today-bg:rgba(166,75,42,.10);--today-bdr:rgba(166,75,42,.30);
}

/* ═══════════════════════════════════════════════
   DARK THEME
   ═══════════════════════════════════════════════ */
html.dark{
  --bg:#1a1a1e;--white:#232328;--hover:#2a2a30;
  --brown:#d0c8be;--accent:#c08060;--accent-dim:rgba(192,128,96,.09);--accent-bdr:rgba(192,128,96,.20);
  --copper:#c08060;--sage:#7ea87e;--clay:#c09870;--muted:#8a8280;--muted2:#54504e;
  --text:#d5d0ca;--t2:#a8a098;--t3:#706a62;--t4:#484440;
  --bdr:#333338;--bdr2:#44444a;
  --test-bg:rgba(192,128,96,.07);--quiz-bg:rgba(192,128,96,.05);--review-bg:rgba(126,168,126,.06);
  --present-bg:rgba(192,152,112,.06);
  --sh:0 1px 3px rgba(0,0,0,.2);--sh2:0 2px 8px rgba(0,0,0,.2),0 8px 24px rgba(0,0,0,.15);
  --bar-opacity:.04;--topbar-bg:rgba(26,26,30,.92);
  --fab-sh:0 4px 20px rgba(0,0,0,.4);--fab-sh2:0 6px 28px rgba(0,0,0,.5);
  --today-bg:rgba(192,128,96,.12);--today-bdr:rgba(192,128,96,.35);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;
  background-attachment:fixed;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}

.page{max-width:1050px;margin:0 auto;padding:2.5rem 1.5rem 4rem;position:relative;z-index:1}

/* Top Bar */
.top-bar{position:sticky;top:0;z-index:100;background:var(--topbar-bg);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bdr);margin:-2.5rem -1.5rem 2rem;padding:.6rem 1.5rem;display:flex;align-items:center;gap:.8rem;transition:background .3s}
.top-bar .lbl{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.ptrack{flex:1;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--copper));border-radius:2px;transition:width .6s}
.ptxt{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);font-weight:600;white-space:nowrap}

/* Header */
header{margin-bottom:2rem}
.htop{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.5rem;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
  padding:.22rem .65rem;border:1px solid var(--accent-bdr);border-radius:100px;background:var(--accent-dim);font-weight:600}
.hacts{display:flex;gap:.4rem}
.hbtn{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--t3);cursor:pointer;background:var(--white);
  border:1px solid var(--bdr);padding:.22rem .65rem;border-radius:100px;transition:all .2s}
.hbtn:hover{color:var(--t2);border-color:var(--bdr2);background:var(--hover)}
header h1{font-family:'Bitter',serif;font-size:2.6rem;font-weight:800;letter-spacing:-.02em;line-height:1.1;color:var(--brown)}
header .sub{color:var(--t3);font-size:.88rem;margin-top:.3rem;font-weight:400}

/* Dark mode toggle */
.dm-toggle{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--t3);cursor:pointer;background:var(--white);
  border:1px solid var(--bdr);padding:.22rem .65rem;border-radius:100px;transition:all .2s;display:flex;align-items:center;gap:.3rem}
.dm-toggle:hover{color:var(--t2);border-color:var(--bdr2);background:var(--hover)}
.dm-icon{font-size:.8rem;line-height:1}

/* Search */
.sbar{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem;padding:.55rem .9rem;background:var(--white);
  border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s,background .3s}
.sbar:focus-within{border-color:var(--accent-bdr);box-shadow:0 0 0 3px var(--accent-dim)}
.sbar .si{color:var(--t4);font-size:.9rem}
.sbar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Karla',sans-serif;font-size:.85rem}
.sbar input::placeholder{color:var(--t4)}
.kbd{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--t4);background:var(--bg);border:1px solid var(--bdr);padding:.1rem .35rem;border-radius:4px}

/* Units */
.unit{margin-bottom:.5rem;border:1px solid var(--bdr);border-radius:var(--r);background:var(--white);box-shadow:var(--sh);
  overflow:hidden;transition:all .3s ease;opacity:0;transform:translateY(18px)}
.unit.revealed{opacity:1;transform:translateY(0)}
.unit:hover{border-color:var(--bdr2);box-shadow:var(--sh2)}
.unit.current{border-color:var(--accent-bdr);box-shadow:0 0 0 3px var(--accent-dim),var(--sh2)}

.uhead{display:flex;align-items:center;padding:.85rem 1.1rem;cursor:pointer;user-select:none;transition:background .15s;gap:.75rem}
.uhead:hover{background:var(--hover)}
.unum{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--t4);font-weight:600;min-width:1.6rem}
.current .unum{color:var(--accent)}
.utitle{flex:1;font-size:1rem;font-weight:600;color:var(--text);letter-spacing:-.01em}
.ucount{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--t4)}
.utag{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.06em;text-transform:uppercase;padding:.14rem .48rem;border-radius:100px;font-weight:600}
.utag.active{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-bdr)}
.utag.done{background:rgba(95,122,94,.08);color:var(--sage)}
.utag.upcoming{background:var(--bg);color:var(--t4)}
.utag.special{background:rgba(156,102,68,.08);color:var(--clay)}
.chev{width:16px;height:16px;color:var(--t4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.unit.open .chev{transform:rotate(180deg);color:var(--t3)}
.ubody{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)}
.unit.open .ubody{grid-template-rows:1fr}
.ubody-inner{overflow:hidden}
.ucontent{padding:0;border-top:1px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch}

/* Table */
.ltable{width:100%;border-collapse:collapse;font-size:.84rem}
.ltable thead tr{background:var(--bg)}
.ltable th{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t3);padding:.5rem 1rem;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
.ltable th:first-child{width:2.5rem;text-align:center}
.ltable .th-notes{min-width:260px}
.ltable .th-res{min-width:220px}
.ltable td{padding:.55rem 1rem;vertical-align:top;border-bottom:1px solid rgba(0,0,0,.03)}
.ltable tr:last-child td{border-bottom:none}
.ltable tr:hover{background:rgba(0,0,0,.012)}
html.dark .ltable tr:hover{background:rgba(255,255,255,.02)}
.ltable tr.is-test{background:var(--test-bg)}
.ltable tr.is-test:hover{background:rgba(160,82,45,.1)}
.ltable tr.is-quiz{background:var(--quiz-bg)}
.ltable tr.is-review{background:var(--review-bg)}
.ltable tr.is-present{background:var(--present-bg)}
.ltable tr.is-today{background:var(--today-bg);border-left:3px solid var(--accent)}

/* Staggered row reveal */
.ltable tbody tr{opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease}
.unit.open .ltable tbody tr{opacity:1;transform:translateY(0)}

.td-num{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--t4);text-align:center;width:2.5rem}
.td-topic{font-weight:400}

/* Link groups */
.lgroup{display:flex;flex-direction:column;gap:.2rem}
.dlink{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem;transition:opacity .15s;line-height:1.35}
.dlink:hover{opacity:.7;text-decoration:underline}
.dlink.note-link{color:var(--accent);font-weight:500}
.dlink.completed-link{color:var(--sage);font-size:.72rem;font-weight:500}
.dlink.completed-link.soon{color:var(--t4);cursor:default}
.dlink.completed-link.soon:hover{opacity:1;text-decoration:none}
.dlink.soln{color:var(--sage);font-size:.72rem}
.dlink.vid{color:var(--copper);font-size:.72rem}
.dlink.res{color:var(--muted);font-size:.76rem}
.licon{width:11px;height:11px;flex-shrink:0;opacity:.7}

/* Topic head with date */
.topic-head{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.12rem}
.lesson-date{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t4);white-space:nowrap;margin-left:auto}

/* Test badge */
.test-badge{display:inline-block;background:var(--copper);color:#fff;font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.06em;text-transform:uppercase;padding:.16rem .48rem;border-radius:3px;font-weight:500}
/* Quiz badge */
.quiz-badge{display:inline-block;background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.06em;text-transform:uppercase;padding:.16rem .48rem;border-radius:3px;font-weight:500}

/* Note title tooltip */
.nt-wrap{position:relative;display:inline}
.nt-tip{display:none;position:absolute;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);padding:.2rem .55rem;border-radius:5px;font-size:.6rem;
  font-family:'Karla',sans-serif;white-space:nowrap;z-index:20;pointer-events:none}
.nt-tip{bottom:calc(100% + 5px)}
.nt-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}
.nt-tip.below{bottom:auto;top:calc(100% + 5px)}
.nt-tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--text)}
.nt-wrap:hover .nt-tip{display:block}

/* Completed note tooltip */
.cn-wrap{position:relative;display:inline-flex}
.cn-tip{display:none;position:absolute;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);padding:.2rem .55rem;border-radius:5px;font-size:.6rem;
  font-family:'Karla',sans-serif;white-space:nowrap;z-index:20;pointer-events:none}
.cn-tip{bottom:calc(100% + 5px)}
.cn-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}
.cn-tip.below{bottom:auto;top:calc(100% + 5px)}
.cn-tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--text)}
.cn-wrap:hover .cn-tip{display:block}

/* Legend & FAB */
.legend{margin-top:2.5rem;padding-top:1.2rem;border-top:1px solid var(--bdr);display:flex;flex-wrap:wrap;gap:1.5rem;font-size:.73rem;color:var(--t4)}
.legend-item{display:flex;align-items:center;gap:.4rem}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:var(--accent);color:#fff;border:none;border-radius:100px;
  padding:.55rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:600;cursor:pointer;
  box-shadow:var(--fab-sh);transition:all .25s;display:none;align-items:center;gap:.35rem}
.fab:hover{transform:translateY(-2px);box-shadow:var(--fab-sh2)}
.fab.visible{display:flex}


@media(max-width:768px){
  .page{padding:2rem .75rem}header h1{font-size:2rem}
  .top-bar{margin:-2rem -.75rem 1.5rem;padding:.5rem .75rem}
  .ltable{min-width:560px}
  .fab{bottom:1rem;right:1rem}.hacts .hbtn{display:none}
}

/* ═══════════════════════════════════════════════
   PRINT STYLESHEET
   ═══════════════════════════════════════════════ */
@media print{
  *{color-adjust:exact;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html.dark{--bg:#fff;--white:#fff;--text:#000;--t2:#333;--t3:#666;--t4:#999;
    --bdr:#ccc;--brown:#000;--accent:#a64b2a;--copper:#a0522d;--sage:#698068}
  body{background:#fff!important}
  #bgBars,.fab,.top-bar,.sbar,.hacts,.dm-toggle{display:none!important}
  .page{max-width:100%;padding:0}
  .unit{break-inside:avoid;page-break-inside:avoid;margin-bottom:1rem;border:1px solid #ccc;box-shadow:none!important;
    opacity:1!important;transform:none!important}
  .unit,.unit.open{display:block}
  .ubody{display:block!important;grid-template-rows:1fr!important}
  .ubody-inner{overflow:visible!important}
  .unit.current{border-color:#ccc;box-shadow:none!important}
  .ltable tbody tr{opacity:1!important;transform:none!important}
  .chev{display:none}
  .legend{page-break-before:avoid}
  header h1{font-size:2rem}
  a{text-decoration:none!important}
  .dlink:hover{text-decoration:none!important}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════
// DARK MODE
// ═══════════════════════════════════════════════
function applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('dmIcon').textContent = dark ? '☀︎' : '☾';
  document.getElementById('dmLabel').textContent = dark ? 'Light' : 'Dark';
  // Update bar chart SVG colour & opacity
  const svg = document.getElementById('bgBars');
  svg.style.color = dark ? '#c08060' : '#a64b2a';
  svg.style.opacity = dark ? '.04' : '.045';
}
function toggleDark() {
  const going = !document.documentElement.classList.contains('dark');
  applyTheme(going);
  try { localStorage.setItem('mdm4u-dark', going ? '1' : '0'); } catch(e){}
}
// Init: check saved preference, then system preference
(function(){
  let dark = false;
  try {
    // Clear stale theme preference from older versions
    const ver = localStorage.getItem('mdm4u-theme-v');
    if (ver !== '2') { localStorage.removeItem('mdm4u-dark'); localStorage.setItem('mdm4u-theme-v','2'); }
    const saved = localStorage.getItem('mdm4u-dark');
    if (saved !== null) { dark = saved === '1'; }
    else { dark = window.matchMedia('(prefers-color-scheme: dark)').matches; }
  } catch(e) {
    dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  applyTheme(dark);
  // Listen for system changes (only if no manual override)
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    try { if (localStorage.getItem('mdm4u-dark') !== null) return; } catch(ex){}
    applyTheme(e.matches);
  });
})();

// ═══════════════════════════════════════════════
// SEASONAL ACCENT (subtle hue shift)
// Sep-Nov: warm amber · Dec-Feb: cool sienna · Mar-May: earthy terracotta · Jun-Aug: golden
// ═══════════════════════════════════════════════
(function(){
  const m = new Date().getMonth(); // 0-11
  let hueShift = '0deg';
  if (m >= 8 && m <= 10) hueShift = '-8deg';      // Sep-Nov: slightly cooler
  else if (m >= 11 || m <= 1) hueShift = '5deg';   // Dec-Feb: slightly warmer
  else if (m >= 2 && m <= 4) hueShift = '0deg';    // Mar-May: base
  else hueShift = '-5deg';                          // Jun-Aug: slightly golden
  if (hueShift !== '0deg') document.documentElement.style.filter = `hue-rotate(${hueShift})`;
})();

// ═══════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════
const IC = {
  doc: `<svg class="licon" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4h5v2H4zm0 3h8v2H4zm0 3h6v2H4zm9-9H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V5l-4-4z"/></svg>`,

function mkLink(text, href, type) {
  if (!href) return `<span style="font-size:.76rem;color:var(--t2)">${text}</span>`;
  let cls = 'dlink res', icon = IC.link;
  if (type === 'vid') { cls = 'dlink vid'; icon = IC.vid; }
  else if (type === 'soln') { cls = 'dlink soln'; icon = IC.soln; }
  else if (type === 'doc') { cls = 'dlink res'; icon = IC.doc; }
  return `<a href="${href}" target="_blank" class="${cls}">${icon}${text}</a>`;
}

// DATE PARSING — for auto-detection
// Parses "Mon Feb 2" style dates into a Date object
// Uses the YEAR from the course data context (semester start)
// ═══════════════════════════════════════════════
const COURSE_YEAR = 2026; // ← Change this to match your school year
function parseDay(dStr) {
  if (!dStr) return null;
  const parts = dStr.replace(/,/g,'').split(/\s+/);
  if (parts.length < 3) return null;
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const mon = months[parts[1]];
  if (mon === undefined) return null;
  const day = parseInt(parts[2]);
  if (isNaN(day)) return null;
  // Handle semester 2 dates that wrap into January (e.g. Carnival report writing)
  let year = COURSE_YEAR;
  if (mon <= 1) {
    // Jan/Feb could be start of course OR next year for carnival
    // If the first unit starts in Feb, keep same year; otherwise bump
  }
  return new Date(year, mon, day);
}

// ═══════════════════════════════════════════════
// AUTO-DETECT CURRENT UNIT & DAY
// ═══════════════════════════════════════════════
let CURRENT_UNIT = 1;
let TODAY_UNIT = -1;
let TODAY_DAY = -1;

(function autoDetect(){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let bestUnit = -1, bestDay = -1, bestDate = null;
  let lastPastUnit = -1;

  C.forEach((unit, ui) => {
    unit.days.forEach((day) => {
      const d = parseDay(day.d);
      if (!d) return;
      // Track the most recent past-or-today lesson
      if (d <= today) {
        lastPastUnit = ui;
        if (!bestDate || d >= bestDate) {
          bestDate = d;
          bestUnit = ui;
          bestDay = day.n;
        }
      }
      // Exact match for today
      if (d.getTime() === today.getTime()) {
        TODAY_UNIT = ui;
        TODAY_DAY = day.n;
      }
    });
  });

  // Set current unit to the one containing the most recent lesson
  if (bestUnit >= 0) {
    // Find the 1-indexed position (skipping specials for numbering)
    CURRENT_UNIT = bestUnit + 1;
  }
})();

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function renderRes(items) {
  if (!items || items.length === 0) return '<span style="color:var(--t4)">—</span>';
  return `<div class="lgroup">${items.map(i => mkLink(i.t, i.h, i.y)).join('')}</div>`;
}

function renderUnit(unit, idx) {
  const uIdx = idx + 1;
  const isCurrent = uIdx === CURRENT_UNIT;
  let status, statusLabel;
  if (unit.special) {
    status = 'special';
    statusLabel = 'Ongoing';
  } else if (isCurrent) {
    status = 'active';
    statusLabel = 'Current';
  } else if (uIdx < CURRENT_UNIT) {
    status = 'done';
    statusLabel = 'Done';
  } else {
    status = 'upcoming';
    statusLabel = 'Upcoming';
  }

  const displayNum = unit.special ? '✦' : String(uIdx).padStart(2,'0');

  const rows = unit.days.map((day, di) => {
    if (!day.topic) return '';
    let rc = day.type === 'test' ? 'is-test' : day.type === 'quiz' ? 'is-quiz' : day.type === 'review' ? 'is-review' : day.type === 'present' ? 'is-present' : '';
    // Highlight today's row
    if (idx === TODAY_UNIT && day.n === TODAY_DAY) rc += ' is-today';
    const tipDir = di === 0 ? 'below' : '';
    // Stagger delay
    const stagger = `style="transition-delay:${di * 0.03}s"`;

    let topicHTML = '';
    if (day.type === 'test') {
      topicHTML = `<div class="topic-head"><span class="test-badge">${day.topic}</span>${day.d ? `<span class="lesson-date">${day.d}</span>` : ''}</div>`;
    } else if (day.type === 'quiz') {
      topicHTML = `<div class="topic-head"><span class="quiz-badge">${day.topic}</span>${day.d ? `<span class="lesson-date">${day.d}</span>` : ''}</div>`;
    } else {
      let titleLink = '';
      if (day.blank) {
        titleLink = `<span class="nt-wrap"><a href="${day.blank}" target="_blank" class="dlink note-link">${IC.doc}${day.topic}</a><span class="nt-tip ${tipDir}">Click to view blank note and homework</span></span>`;
      } else {
        titleLink = `<span style="font-size:.84rem;font-weight:500">${day.topic}</span>`;
      }

      let noteHTML = '';
      if (day.topicNote) {
        noteHTML = `<div style="font-size:.7rem;color:var(--t3);font-style:italic;margin-top:.1rem">${day.topicNote}</div>`;
      }

      let completedHTML = '';
      if (day.filled) {
        completedHTML = `<span class="cn-wrap"><a href="${day.filled}" target="_blank" class="dlink completed-link">${IC.soln}Completed Note</a></span>`;
      } else if (day.filledSoon && day.blank) {
        completedHTML = `<span class="cn-wrap"><span class="dlink completed-link soon">${IC.doc}Completed Note</span><span class="cn-tip ${tipDir}">Coming soon</span></span>`;
      }

      topicHTML = `<div class="topic-head">${titleLink}${day.d ? `<span class="lesson-date">${day.d}</span>` : ''}</div>${noteHTML}${completedHTML}`;
    }

    return `<tr class="${rc}" ${stagger}><td class="td-num">${day.n}</td><td class="td-topic">${topicHTML}</td><td>${renderRes(day.res)}</td></tr>`;
  }).join('');

  return `<div class="unit${isCurrent ? ' current' : ''}" data-unit="${uIdx}">
    <div class="uhead" onclick="toggleU(this)">
      <span class="unum">${displayNum}</span>
      <span class="utitle">${unit.title}</span>
      <span class="ucount">${unit.days.filter(d=>d.topic).length} days</span>
      <span class="utag ${status}">${statusLabel}</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="ubody"><div class="ubody-inner"><div class="ucontent">
      <table class="ltable">
        <thead><tr><th>#</th><th class="th-notes">Course Notes & Homework</th><th class="th-res">Resources</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div></div>
  </div>`;
}

// Build
const container = document.getElementById('units');
container.innerHTML = C.map((u, i) => renderUnit(u, i)).join('');

// ── Toggle ──
function toggleU(h) { h.parentElement.classList.toggle('open'); }

let allExp = false;
function toggleAll() {
  allExp = !allExp;
  document.querySelectorAll('.unit').forEach(u => allExp ? u.classList.add('open') : u.classList.remove('open'));
  document.getElementById('expBtn').textContent = allExp ? 'Collapse All' : 'Expand All';
  if (!allExp) { const c = document.querySelector(`.unit[data-unit="${CURRENT_UNIT}"]`); if (c) c.classList.add('open'); }
}

// ── Search ──
function filterL(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.unit').forEach(u => {
    if (!q) { u.style.display = ''; return; }
    const m = u.textContent.toLowerCase().includes(q);
    u.style.display = m ? '' : 'none';
    if (m && q.length > 1) u.classList.add('open');
  });
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('si').focus(); }
  if (e.key === 'Escape') { const i = document.getElementById('si'); i.blur(); i.value = ''; filterL(''); }
});

// ── Jump ──
function jumpC() {
  const c = document.querySelector('.unit.current');
  if (c) { c.scrollIntoView({ behavior: 'smooth', block: 'center' }); if (!c.classList.contains('open')) c.classList.add('open'); }
}

// ── Scroll reveal ──
const rObs = new IntersectionObserver(es => {
  es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); rObs.unobserve(e.target); } });
}, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

const fObs = new IntersectionObserver(([e]) => {
  document.getElementById('fab').classList.toggle('visible', !e.isIntersecting);
}, { threshold: 0.1 });

document.addEventListener('DOMContentLoaded', () => {
  const c = document.querySelector(`.unit[data-unit="${CURRENT_UNIT}"]`);
  if (c) c.classList.add('open');

  // Progress bar
  const curriculumUnits = C.filter(u => !u.special).length;
  const done = Math.max(0, CURRENT_UNIT - 1);
  document.getElementById('pf').style.width = Math.round((done / curriculumUnits) * 100) + '%';
  document.getElementById('pt').textContent = `${done}/${curriculumUnits}`;

  // Scroll reveal
  document.querySelectorAll('.unit').forEach((u, i) => {
    u.style.transitionDelay = `${i * 0.06}s`;
    u.style.transitionDuration = '0.5s';
    u.style.transitionTimingFunction = 'cubic-bezier(0.16, 1, 0.3, 1)';
    u.style.transitionProperty = 'opacity, transform';
    rObs.observe(u);
  });

  if (c) fObs.observe(c);
});
</script>
